HTTP_PORT=11626
PUBLIC_HTTP_PORT=true
PEER_PORT=11625

# This exact value must match .env and stellar-captive-core.cfg.
NETWORK_PASSPHRASE="Acme Private Stellar Network ; June 2026"

# File content must be: SXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX self
NODE_SEED="$FILE:/run/secrets/node_seed"
NODE_IS_VALIDATOR=true
NODE_HOME_DOMAIN="private.local"

DATABASE="sqlite3:///var/lib/stellar-core/stellar.db"
BUCKET_DIR_PATH="/var/lib/stellar-core/buckets"

# Speeds up ledger closing/checkpoints for a local development network.
ARTIFICIALLY_ACCELERATE_TIME_FOR_TESTING=true

# A one-validator quorum is deliberately unsafe and has no fault tolerance.
FAILURE_SAFETY=0
UNSAFE_QUORUM=true

[QUORUM_SET]
THRESHOLD_PERCENT=100
VALIDATORS=["$self"]

[HISTORY.local]
get="cp /history/{0} {1}"
put="cp {0} /history/{1}"
mkdir="mkdir -p /history/{0}"
