HTTP_PORT=11726
PUBLIC_HTTP_PORT=false
PEER_PORT=11725

# This exact value must match .env and stellar-core.cfg.
NETWORK_PASSPHRASE="Acme Private Stellar Network ; June 2026"

DATABASE="sqlite3:///var/lib/stellar-horizon/captive-core/stellar.db"
ARTIFICIALLY_ACCELERATE_TIME_FOR_TESTING=true
ENABLE_SOROBAN_DIAGNOSTIC_EVENTS=true

FAILURE_SAFETY=0
UNSAFE_QUORUM=true

[[VALIDATORS]]
NAME="private_node_1"
HOME_DOMAIN="private.local"

# Replace this with the G... public key printed by `stellar-core gen-seed`.
PUBLIC_KEY="REPLACE_WITH_NODE_PUBLIC_KEY"

# Docker service name and Stellar Core peer port.
ADDRESS="stellar-core:11625"
QUALITY="MEDIUM"

# The history archive is served by the `history` Nginx container.
HISTORY="curl -sf http://history/{0} -o {1}"
