#!/bin/sh
set -eu

CFG="/etc/stellar/stellar-core.cfg"
DATA_DIR="/var/lib/stellar-core"

mkdir -p "${DATA_DIR}/buckets" /history

if [ ! -f "${DATA_DIR}/.initialized" ]; then
  echo "Initializing Stellar Core database..."
  stellar-core new-db --conf "${CFG}"

  echo "Initializing local history archive..."
  stellar-core new-hist local --conf "${CFG}"

  touch "${DATA_DIR}/.initialized"
fi

exec stellar-core run --conf "${CFG}"
